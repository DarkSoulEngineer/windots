general:
  startup_commands:
    - 'shell-exec zebar'
  shutdown_commands: ['shell-exec taskkill /IM zebar.exe /F']
  config_reload_commands: []

  focus_follows_cursor: true
  toggle_workspace_on_refocus: false

  cursor_jump:
    enabled: true
    trigger: 'monitor_focus'

  hide_method: 'cloak'
  show_all_in_taskbar: false

gaps:
  scale_with_dpi: true
  inner_gap: '8px'
  outer_gap:
    top: '48px'   #Zebar
    right: '8px'
    bottom: '8px'
    left: '8px'

window_effects:
  focused_window:
    border:
      enabled: true
      color: '#6C9DA4'
    hide_title_bar:
      enabled: false
    corner_style:
      enabled: true
      style: 'rounded'
    transparency:
      enabled: false

  other_windows:
    border:
      enabled: true
      color: '#37393A'
    hide_title_bar:
      enabled: false
    corner_style:
      enabled: false
      style: 'rounded'
    transparency:
      enabled: false

window_behavior:
  initial_state: 'tiling'

  state_defaults:
    floating:
      centered: true
      shown_on_top: true
    fullscreen:
      maximized: true
      shown_on_top: false

workspaces:
  # Monitor 0 (leftmost) - 4 workspaces
  - name: '1'
    bind_to_monitor: 0
  - name: '2'
    bind_to_monitor: 0
  - name: '3'
    bind_to_monitor: 0
  - name: '4'
    bind_to_monitor: 0
  # Monitor 1 (middle) - 3 workspaces
  - name: '5'
    bind_to_monitor: 1
  - name: '6'
    bind_to_monitor: 1
  - name: '7'
    bind_to_monitor: 1
  # Monitor 2 (right) - 3 workspaces
  - name: '8'
    bind_to_monitor: 2
  - name: '9'
    bind_to_monitor: 2
  - name: '0'
    bind_to_monitor: 2

window_rules:
  - commands: ['ignore']
    match:
      - window_process: {equals: 'zebar'}
      - window_title: {regex: '[Pp]icture.in.[Pp]icture'}
        window_class: {regex: 'Chrome_WidgetWin_1|MozillaDialogClass'}
      - window_process: {equals: 'PowerToys'}
        window_class: {regex: 'HwndWrapper\[PowerToys\.PowerAccent.*?\]'}
      - window_process: {equals: 'PowerToys'}
        window_title: {regex: '.*? - Peek'}
      - window_process: {equals: 'Lively'}
        window_class: {regex: 'HwndWrapper'}
      - window_process: {equals: 'EXCEL'}
        window_class: {not_regex: 'XLMAIN'}
      - window_process: {equals: 'WINWORD'}
        window_class: {not_regex: 'OpusApp'}
      - window_process: {equals: 'POWERPNT'}
        window_class: {not_regex: 'PPTFrameClass'}

  - commands: ['set-floating --centered']
    match:
      - window_process: {equals: 'KeePassXC'}
      - window_process: {equals: 'Taskmgr'}
      - window_process: {equals: 'Discord'}
      - window_process: {equals: 'Spotify'}
      - window_process: {equals: 'Teams'}
      - window_process: {equals: 'slack'}
      - window_process: {equals: 'zoom'}
      # Installers and setup wizards
      - window_process: {equals: 'msiexec'}
      - window_process: {equals: 'winget'}
      - window_process: {regex: '^(setup|install|uninstall)$'}
      - window_title: {regex: '[Ii]nstall|[Ss]etup|[Uu]pdate'}

binding_modes:
  - name: 'dev'
    keybindings:
      - commands: ['wm-disable-binding-mode --name dev']
        bindings: ['alt+d', 'escape', 'enter']
    show_bar_text: "Passthrough Mode Active"

  - name: 'resize'
    keybindings:
      - commands: ['resize --width -5%']
        bindings: ['h', 'left']
      - commands: ['resize --width +5%']
        bindings: ['l', 'right']
      - commands: ['resize --height -5%']
        bindings: ['j', 'down']
      - commands: ['resize --height +5%']
        bindings: ['k', 'up']
      - commands: ['wm-disable-binding-mode --name resize']
        bindings: ['alt+r', 'escape', 'enter']

keybindings:
  # Binding modes
  - commands: ['wm-enable-binding-mode --name dev']
    bindings: ['alt+d']
  - commands: ['wm-enable-binding-mode --name resize']
    bindings: ['alt+r']

  # Navigation (vim + arrows)
  - commands: ['focus --direction left']
    bindings: ['alt+h', 'alt+left']
  - commands: ['focus --direction right']
    bindings: ['alt+l', 'alt+right']
  - commands: ['focus --direction up']
    bindings: ['alt+k', 'alt+up']
  - commands: ['focus --direction down']
    bindings: ['alt+j', 'alt+down']

  # Move windows
  - commands: ['move --direction left']
    bindings: ['alt+shift+h', 'alt+shift+left']
  - commands: ['move --direction right']
    bindings: ['alt+shift+l', 'alt+shift+right']
  - commands: ['move --direction up']
    bindings: ['alt+shift+k', 'alt+shift+up']
  - commands: ['move --direction down']
    bindings: ['alt+shift+j', 'alt+shift+down']

  # Tiling / floating / fullscreen
  - commands: ['toggle-tiling']
    bindings: ['alt+t']
  - commands: ['toggle-floating --centered']
    bindings: ['alt+shift+space']
  - commands: ['toggle-fullscreen']
    bindings: ['alt+f']
  - commands: ['toggle-tiling-direction']
    bindings: ['alt+shift+t']

  # Focus cycle / minimize
  - commands: ['wm-cycle-focus']
    bindings: ['alt+space']
  - commands: ['toggle-minimized']
    bindings: ['alt+m']

  # Window control
  - commands: ['close']
    bindings: ['alt+shift+q']
  - commands: ['wm-exit']
    bindings: ['alt+shift+e']
  - commands: ['wm-reload-config']
    bindings: ['alt+shift+r']
  - commands: ['wm-redraw']
    bindings: ['alt+shift+w']

  # App launchers (native shell-exec, no powershell wrapper)
  # - commands: ['shell-exec wezterm']
  #   bindings: ['alt+c']
  - commands: ['shell-exec wt']
    bindings: ['alt+c']
  - commands: ['shell-exec brave']
    bindings: ['alt+b']
  - commands: ['shell-exec explorer']
    bindings: ['alt+e']
  - commands: ['shell-exec --hide-window __VSCODE_PATH__']
    bindings: ['alt+v']
  - commands: ['shell-exec ms-settings:']
    bindings: ['alt+shift+s']

  # Workspace navigation
  - commands: ['focus --workspace 1']
    bindings: ['alt+1']
  - commands: ['focus --workspace 2']
    bindings: ['alt+2']
  - commands: ['focus --workspace 3']
    bindings: ['alt+3']
  - commands: ['focus --workspace 4']
    bindings: ['alt+4']
  - commands: ['focus --workspace 5']
    bindings: ['alt+5']
  - commands: ['focus --workspace 6']
    bindings: ['alt+6']
  - commands: ['focus --workspace 7']
    bindings: ['alt+7']
  - commands: ['focus --workspace 8']
    bindings: ['alt+8']
  - commands: ['focus --workspace 9']
    bindings: ['alt+9']
  - commands: ['focus --workspace 0']
    bindings: ['alt+0']

  # Move windows to workspaces
  - commands: ['move --workspace 1', 'focus --workspace 1']
    bindings: ['alt+shift+1']
  - commands: ['move --workspace 2', 'focus --workspace 2']
    bindings: ['alt+shift+2']
  - commands: ['move --workspace 3', 'focus --workspace 3']
    bindings: ['alt+shift+3']
  - commands: ['move --workspace 4', 'focus --workspace 4']
    bindings: ['alt+shift+4']
  - commands: ['move --workspace 5', 'focus --workspace 5']
    bindings: ['alt+shift+5']
  - commands: ['move --workspace 6', 'focus --workspace 6']
    bindings: ['alt+shift+6']
  - commands: ['move --workspace 7', 'focus --workspace 7']
    bindings: ['alt+shift+7']
  - commands: ['move --workspace 8', 'focus --workspace 8']
    bindings: ['alt+shift+8']
  - commands: ['move --workspace 9', 'focus --workspace 9']
    bindings: ['alt+shift+9']
  - commands: ['move --workspace 0', 'focus --workspace 0']
    bindings: ['alt+shift+0']

  # Move workspace between monitors
  - commands: ['move-workspace --direction left']
    bindings: ['alt+shift+a']
  - commands: ['move-workspace --direction right']
    bindings: ['alt+shift+d']
