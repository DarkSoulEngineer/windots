<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" type="text/css" href="./styles.css" />

  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"
    integrity="sha256-aS0B0wnsaDByLfE16h4MDCP1fQFccysd1YWOcV+gbBo=" crossorigin="anonymous"></script>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, {
      useState,
      useEffect,
      useRef,
      useCallback,
    } from 'https://esm.sh/react@18?dev';
    import { createRoot } from 'https://esm.sh/react-dom@18/client?dev';
    import * as zebar from 'https://esm.sh/zebar@2';

    const providers = zebar.createProviderGroup({
      network: { type: 'network' },
      glazewm: { type: 'glazewm' },
      cpu: { type: 'cpu' },
      date: { type: 'date', formatting: 'EEE, MMM yyyy d, h:mm a' },
      battery: { type: 'battery' },
      memory: { type: 'memory' },
      weather: { type: 'weather' },
      disk: { type: 'disk' },
      audio: { type: 'audio' },
    });

    createRoot(document.getElementById('root')).render(<App />);

    function App() {
      const [output, setOutput] = useState(providers.outputMap);
      const [audioData, setAudioData] = useState(new Uint8Array(0));
      const [audioError, setAudioError] = useState(false);
      const audioContextRef = useRef(null);
      const analyserRef = useRef(null);
      const animFrameRef = useRef(null);
      const streamRef = useRef(null);

      useEffect(() => {
        providers.onOutput(() => setOutput(providers.outputMap));
      }, []);

      const initAudio = useCallback(async () => {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            audio: {
              echoCancellation: false,
              noiseSuppression: false,
              autoGainControl: false,
            }
          });
          streamRef.current = stream;

          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          audioContextRef.current = ctx;

          const source = ctx.createMediaStreamSource(stream);
          const analyser = ctx.createAnalyser();
          analyser.fftSize = 128;
          analyser.smoothingTimeConstant = 0.75;
          source.connect(analyser);
          analyserRef.current = analyser;

          const dataArray = new Uint8Array(analyser.frequencyBinCount);

          const tick = () => {
            analyser.getByteFrequencyData(dataArray);
            setAudioData(new Uint8Array(dataArray));
            animFrameRef.current = requestAnimationFrame(tick);
          };
          tick();
        } catch (err) {
          console.warn('Audio capture failed (enable Stereo Mix in Sound settings):', err);
          setAudioError(true);
        }
      }, []);

      useEffect(() => {
        initAudio();
        return () => {
          if (animFrameRef.current) cancelAnimationFrame(animFrameRef.current);
          if (streamRef.current) {
            streamRef.current.getTracks().forEach(t => t.stop());
          }
          if (audioContextRef.current) {
            audioContextRef.current.close();
          }
        };
      }, [initAudio]);

      function getNetworkIcon(networkOutput) {
        switch (networkOutput.defaultInterface?.type) {
          case 'ethernet':
            return <i className="nf nf-md-ethernet_cable"></i>;
          case 'wifi':
            if (networkOutput.defaultGateway?.signalStrength >= 80) {
              return <i className="nf nf-md-wifi_strength_4"></i>;
            } else if (networkOutput.defaultGateway?.signalStrength >= 65) {
              return <i className="nf nf-md-wifi_strength_3"></i>;
            } else if (networkOutput.defaultGateway?.signalStrength >= 40) {
              return <i className="nf nf-md-wifi_strength_2"></i>;
            } else if (networkOutput.defaultGateway?.signalStrength >= 25) {
              return <i className="nf nf-md-wifi_strength_1"></i>;
            } else {
              return <i className="nf nf-md-wifi_strength_outline"></i>;
            }
          default:
            return <i className="nf nf-md-wifi_strength_off_outline"></i>;
        }
      }

      function getBatteryIcon(batteryOutput) {
        let batteryClass = '';
        if (batteryOutput.chargePercent === 100) batteryClass = ' full-battery';
        else if (batteryOutput.chargePercent <= 20) batteryClass = ' low-battery';

        let icon;
        if (batteryOutput.chargePercent > 90)
          icon = <i className={`nf nf-fa-battery_4${batteryClass}`}></i>;
        else if (batteryOutput.chargePercent > 70)
          icon = <i className={`nf nf-fa-battery_3${batteryClass}`}></i>;
        else if (batteryOutput.chargePercent > 40)
          icon = <i className={`nf nf-fa-battery_2${batteryClass}`}></i>;
        else if (batteryOutput.chargePercent > 20)
          icon = <i className={`nf nf-fa-battery_1${batteryClass}`}></i>;
        else
          icon = <i className={`nf nf-fa-battery_0${batteryClass}`}></i>;

        if (batteryOutput.isCharging) {
          return (
            <>
              <i className="nf nf-md-power_plug charging"></i>
              {icon}
            </>
          );
        }
        return icon;
      }

      function getWeatherIcon(weatherOutput) {
        switch (weatherOutput.status) {
          case 'clear_day': return <i className="nf nf-weather-day_sunny"></i>;
          case 'clear_night': return <i className="nf nf-weather-night_clear"></i>;
          case 'cloudy_day': return <i className="nf nf-weather-day_cloudy"></i>;
          case 'cloudy_night': return <i className="nf nf-weather-night_alt_cloudy"></i>;
          case 'light_rain_day': return <i className="nf nf-weather-day_sprinkle"></i>;
          case 'light_rain_night': return <i className="nf nf-weather-night_alt_sprinkle"></i>;
          case 'heavy_rain_day': return <i className="nf nf-weather-day_rain"></i>;
          case 'heavy_rain_night': return <i className="nf nf-weather-night_alt_rain"></i>;
          case 'snow_day': return <i className="nf nf-weather-day_snow"></i>;
          case 'snow_night': return <i className="nf nf-weather-night_alt_snow"></i>;
          case 'thunder_day': return <i className="nf nf-weather-day_lightning"></i>;
          case 'thunder_night': return <i className="nf nf-weather-night_alt_lightning"></i>;
        }
      }

      function getVolumeIcon(audioOutput) {
        const vol = Math.round(audioOutput.defaultPlaybackDevice?.volume ?? 0);
        if (vol === 0) return <i className="nf nf-fa-volume_off"></i>;
        if (vol <= 33) return <i className="nf nf-fa-volume_down"></i>;
        if (vol <= 66) return <i className="nf nf-md-volume_medium"></i>;
        return <i className="nf nf-fa-volume_up"></i>;
      }

      function getDiskUsagePercent(diskOutput) {
        if (!diskOutput?.disks?.length) return 0;
        const total = diskOutput.disks.reduce((s, d) => s + d.totalSpace.bytes, 0);
        const used = diskOutput.disks.reduce((s, d) => s + (d.totalSpace.bytes - d.availableSpace.bytes), 0);
        return total > 0 ? Math.round((used / total) * 100) : 0;
      }

      function AudioVisualizer({ audioData, audioError }) {
        const barCount = 24;
        const bars = [];

        for (let i = 0; i < barCount; i++) {
          const dataIndex = Math.floor((i / barCount) * audioData.length);
          const value = audioData[dataIndex] ?? 0;
          const height = Math.max(2, (value / 255) * 28);
          bars.push(
            <div
              key={i}
              className="cava-bar"
              style={{ height: `${height}px` }}
            />
          );
        }

        return (
          <div className={`cava-container ${audioError ? 'cava-error' : ''}`}>
            <i className="nf nf-fa-music cava-icon"></i>
            <div className="cava-bars">
              {bars}
            </div>
          </div>
        );
      }

      return (
        <div className="app">
          <div className="left">
            <i className="logo nf nf-fa-windows"></i>
            {output.glazewm && (
              <div className="workspaces">
                {output.glazewm.currentWorkspaces.map(workspace => (
                  <button
                    className={`workspace ${workspace.hasFocus && 'focused'} ${workspace.isDisplayed && 'displayed'}`}
                    onClick={() =>
                      output.glazewm.runCommand(
                        `focus --workspace ${workspace.name}`,
                      )
                    }
                    key={workspace.name}
                  >
                    {workspace.displayName ?? workspace.name}
                  </button>
                ))}
              </div>
            )}
          </div>

          <div className="center">
            <span className="date">{output.date?.formatted}</span>
            {output.glazewm?.focusedContainer?.processName && (
              <>
                <span className="separator">•</span>
                <span className="process">{output.glazewm?.focusedContainer?.processName}</span>
              </>
            )}
          </div>

          <div className="right">
            <AudioVisualizer audioData={audioData} audioError={audioError} />

            <div className="status-box">
              {output.glazewm && (
                <>
                  {output.glazewm.isPaused && (
                    <button
                      className="paused-button"
                      onClick={() => output.glazewm.runCommand('wm-toggle-pause')}
                    >
                      PAUSED
                    </button>
                  )}
                  {output.glazewm.bindingModes.map(bindingMode => (
                    <button
                      className="binding-mode"
                      key={bindingMode.name}
                      onClick={() =>
                        output.glazewm.runCommand(
                          `wm-disable-binding-mode --name ${bindingMode.name}`,
                        )
                      }
                    >
                      {bindingMode.displayName ?? bindingMode.name}
                    </button>
                  ))}

                  <button
                    className={`tiling-direction nf ${output.glazewm.tilingDirection === 'horizontal' ? 'nf-md-swap_horizontal' : 'nf-md-swap_vertical'}`}
                    onClick={() =>
                      output.glazewm.runCommand('toggle-tiling-direction')
                    }
                  ></button>
                </>
              )}

              {output.audio && (
                <div className="audio">
                  {getVolumeIcon(output.audio)}
                  {Math.round(output.audio.defaultPlaybackDevice?.volume ?? 0)}%
                </div>
              )}

              {output.network && (
                <div className="network">
                  {getNetworkIcon(output.network)}
                  {output.network.defaultGateway?.ssid}
                </div>
              )}

              {output.memory && (
                <div className="memory">
                  <i className="nf nf-fae-chip"></i>
                  {Math.round(output.memory.usage)}%
                </div>
              )}

              {output.cpu && (
                <div className="cpu">
                  <i className="nf nf-oct-cpu"></i>
                  <span className={output.cpu.usage > 85 ? 'high-usage' : ''}>
                    {Math.round(output.cpu.usage)}%
                  </span>
                </div>
              )}

              {output.battery && (
                <div className="battery">
                  {getBatteryIcon(output.battery)}
                  {Math.round(output.battery.chargePercent)}%
                </div>
              )}

              {output.disk && (
                <div className="disk">
                  <i className="nf nf-fa-hdd_o"></i>
                  <span className={getDiskUsagePercent(output.disk) > 85 ? 'high-usage' : ''}>
                    {getDiskUsagePercent(output.disk)}%
                  </span>
                </div>
              )}

              {output.weather && (
                <div className="weather">
                  {getWeatherIcon(output.weather)}
                  {Math.round(output.weather.celsiusTemp)}°C
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }
  </script>
</body>

</html>
